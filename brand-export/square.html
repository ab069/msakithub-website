<!doctype html><html><head><meta charset="utf-8">
<style>
  html,body{margin:0;width:1080px;height:1080px;overflow:hidden}
  .stage{position:relative;width:1080px;height:1080px;
    background:radial-gradient(120% 120% at 50% 38%, #1A1636 0%, #0E0D18 55%, #0B0C10 100%);}
  .glow{position:absolute;width:720px;height:720px;left:180px;top:150px;border-radius:50%;
    background:radial-gradient(circle, rgba(124,92,255,.30), rgba(124,92,255,0) 70%);filter:blur(8px);}
  .ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:940px;height:940px;
    border-radius:50%;border:1px solid rgba(167,139,250,.10);}
  .icon{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:680px;height:680px;
    filter:drop-shadow(0 24px 60px rgba(20,8,55,.55));}
</style></head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="ring"></div>
    <img class="icon" src="../public/brand/mark.svg">
  </div>
</body></html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="a-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0F1C"/>
      <stop offset="100%" stop-color="#1B1735"/>
    </linearGradient>
    <linearGradient id="a-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#a-bg)"/>
  <g transform="translate(80,80)" font-family="ui-monospace, monospace" font-size="16">
    <text x="0" y="0" fill="#7C5CFF" opacity="0.7">const</text>
    <text x="60" y="0" fill="#fff">anas</text>
    <text x="110" y="0" fill="#A78BFA">=</text>
    <text x="130" y="0" fill="#fff">{</text>
    <text x="20" y="30" fill="#A78BFA">role:</text>
    <text x="80" y="30" fill="#7C5CFF">'developer'</text>
    <text x="180" y="30" fill="#fff">,</text>
    <text x="20" y="55" fill="#A78BFA">stack:</text>
    <text x="90" y="55" fill="#fff">[</text>
    <text x="100" y="55" fill="#7C5CFF">'ts'</text>
    <text x="132" y="55" fill="#fff">,</text>
    <text x="142" y="55" fill="#7C5CFF">'react'</text>
    <text x="200" y="55" fill="#fff">,</text>
    <text x="210" y="55" fill="#7C5CFF">'node'</text>
    <text x="258" y="55" fill="#fff">],</text>
    <text x="20" y="80" fill="#A78BFA">focus:</text>
    <text x="90" y="80" fill="#7C5CFF">'craft'</text>
    <text x="140" y="80" fill="#fff">,</text>
    <text x="20" y="105" fill="#A78BFA">shipping:</text>
    <text x="115" y="105" fill="#7C5CFF">true</text>
    <text x="0" y="130" fill="#fff">}</text>
  </g>
  <g transform="translate(80,290)">
    <text font-family="Inter, sans-serif" font-weight="800" font-size="90" fill="url(#a-accent)" letter-spacing="-3">Anas</text>
    <text y="70" font-family="Inter, sans-serif" font-weight="300" font-size="34" fill="#fff" opacity="0.7">— building things for the web.</text>
  </g>
  <g transform="translate(620,90)" opacity="0.9">
    <rect x="0" y="0" width="120" height="120" rx="60" fill="none" stroke="url(#a-accent)" stroke-width="2"/>
    <text x="60" y="72" text-anchor="middle" font-family="ui-monospace, monospace" font-size="40" fill="#A78BFA" font-weight="700">&lt;/&gt;</text>
  </g>
  <text x="740" y="470" text-anchor="end" font-family="monospace" font-size="11" fill="#7C5CFF" opacity="0.5">anas-portolio.vercel.app</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="k-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12121A"/>
      <stop offset="100%" stop-color="#1E1B3A"/>
    </linearGradient>
    <linearGradient id="k-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="k-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#k-bg)"/>
  <circle cx="400" cy="250" r="220" fill="url(#k-glow)"/>
  <g opacity="0.9">
    <ellipse cx="400" cy="250" rx="180" ry="60" fill="none" stroke="url(#k-accent)" stroke-width="1.5"/>
    <ellipse cx="400" cy="250" rx="180" ry="60" fill="none" stroke="#A78BFA" stroke-width="1" transform="rotate(45 400 250)" opacity="0.6"/>
    <ellipse cx="400" cy="250" rx="180" ry="60" fill="none" stroke="#A78BFA" stroke-width="1" transform="rotate(-45 400 250)" opacity="0.6"/>
  </g>
  <circle cx="400" cy="250" r="42" fill="url(#k-accent)"/>
  <circle cx="580" cy="250" r="7" fill="#fff"/>
  <circle cx="220" cy="250" r="5" fill="#A78BFA"/>
  <circle cx="527" cy="122" r="4" fill="#fff" opacity="0.7"/>
  <circle cx="273" cy="378" r="4" fill="#fff" opacity="0.7"/>
  <g fill="#fff" opacity="0.4">
    <circle cx="100" cy="80" r="1.5"/>
    <circle cx="700" cy="120" r="1.5"/>
    <circle cx="150" cy="420" r="1.5"/>
    <circle cx="680" cy="400" r="1.5"/>
    <circle cx="80" cy="260" r="1"/>
    <circle cx="720" cy="280" r="1"/>
